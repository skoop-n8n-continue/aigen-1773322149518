<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #10181f; /* Dark default background */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff; /* Light text */
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 8vw;
            color: #00b7af; /* Primary accent color */
            text-shadow: 0 4px 12px rgba(0, 183, 175, 0.4);
            margin-bottom: 20px;
        }

        p {
            font-size: 2.5vw;
            color: #6a7071; /* Secondary gray */
            max-width: 80%;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Subtle continuous animation for digital signage */
        @keyframes pulse {
            0% { text-shadow: 0 4px 12px rgba(0, 183, 175, 0.4); }
            50% { text-shadow: 0 4px 25px rgba(0, 183, 175, 0.8); }
            100% { text-shadow: 0 4px 12px rgba(0, 183, 175, 0.4); }
        }

        h1 {
            animation: pulse 4s infinite alternate ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World</h1>
        <p>Welcome to the digital signage display.</p>
    </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
